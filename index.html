=========================================
index.html
Bookmark Manager
=========================================
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-left">
            <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Toggle sidebar" aria-expanded="false">
                <span class="hamburger-icon">
                    <span></span><span></span><span></span>
                </span>
            </button>
            <div class="brand">
                <span class="brand-icon">📚</span>
                <h1>Bookmark Manager</h1>
            </div>
        </div>
        <div class="topbar-right">
            <label class="upload-btn" role="button" tabindex="0">
                <span class="btn-icon">↥</span>
                <span class="btn-label">Import</span>
                <input type="file" id="bookmarkFile" accept=".html,.htm" hidden>
            </label>
            <button id="btnExportJson">
                <span class="btn-icon">↧</span>
                <span class="btn-label">Export JSON</span>
            </button>
            <button id="btnClearData" class="btn-danger">
                <span class="btn-icon">🗑</span>
                <span class="btn-label">Clear</span>
            </button>
            <button id="btnTheme" class="btn-theme">
                <span id="themeIcon">🌙</span>
                <span class="btn-label" id="themeLabel">Dark</span>
            </button>
        </div>
    </header>

    <!-- MOBILE OVERLAY -->
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <!-- MAIN LAYOUT -->
    <main class="main-layout">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar" role="complementary" aria-label="Folder navigation">
            <div class="search-box">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input id="searchInput" type="search" aria-label="Search bookmarks" placeholder="Search bookmarks…" autocomplete="off">
                    <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>✕</button>
                </div>
            </div>
            <div class="folder-header">
                <h3>Folders</h3>
                <div class="folder-header-actions">
                    <button id="expandAllBtn" class="toolbar-btn" type="button" title="Expand all folders">⊞</button>
                    <button id="collapseAllBtn" class="toolbar-btn" type="button" title="Collapse all folders">⊟</button>
                </div>
            </div>
            <div id="folderTree" class="folder-tree" role="tree" aria-label="Folder tree">
                <div class="empty-state">No bookmarks available</div>
            </div>
        </aside>

        <!-- CONTENT -->
        <section class="content" role="main">

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🔖</div>
                    <div class="stat-body">
                        <div class="stat-title">Total Bookmarks</div>
                        <div id="statBookmarks" class="stat-value">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📁</div>
                    <div class="stat-body">
                        <div class="stat-title">Total Folders</div>
                        <div id="statFolders" class="stat-value">0</div>
                    </div>
                </div>
                <div id="domainsCard" class="stat-card clickable" role="button" tabindex="0" aria-label="View unique domains">
                    <div class="stat-icon">🌐</div>
                    <div class="stat-body">
                        <div class="stat-title">Unique Domains</div>
                        <div id="statDomains" class="stat-value">0</div>
                    </div>
                    <div class="stat-cta">View →</div>
                </div>
                <div id="duplicatesCard" class="stat-card clickable" role="button" tabindex="0" aria-label="View duplicate URLs">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-body">
                        <div class="stat-title">Duplicate URLs</div>
                        <div id="statDuplicates" class="stat-value">0</div>
                    </div>
                    <div class="stat-cta">View →</div>
                </div>
            </div>

            <!-- VIEW HEADER -->
            <div class="view-header">
                <div class="view-header-left">
                    <div class="view-header-title-row">
                        <button id="btnBackToBookmarks" class="btn-back" hidden aria-label="Back to bookmarks">← Back</button>
                        <span id="currentFolderName">All Bookmarks</span>
                    </div>
                    <span id="bookmarkCount" class="view-count">0 items</span>
                </div>
                <div id="viewBadge" class="view-badge">Bookmarks</div>
            </div>

            <!-- BOOKMARK LIST -->
            <div id="bookmarkContainer" class="bookmark-container" role="list" aria-label="Bookmark list">
                <div class="empty-state large">
                    <div class="empty-icon">📭</div>
                    <div class="empty-title">No bookmarks yet</div>
                    <div class="empty-desc">Import a bookmark HTML file to get started</div>
                </div>
            </div>
        </section>

        <!-- DETAILS PANEL -->
        <aside id="detailsPanel" class="details-panel" role="complementary" aria-label="Bookmark details">
            <div class="details-header">
                <h3>Details</h3>
                <button id="closePanelBtn" class="close-panel-btn" aria-label="Close details panel">✕</button>
            </div>
            <div id="bookmarkDetails" class="bookmark-details">
                <div class="empty-state">
                    <div class="empty-icon">👆</div>
                    <div>Select a bookmark to view details</div>
                </div>
            </div>
        </aside>

    </main>

    <!-- TOAST -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- LOADING -->
    <div id="loadingOverlay" class="loading-overlay" hidden>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading…</div>
    </div>

    <!-- TEMPLATES -->
    <template id="bookmarkTemplate">
        <div class="bookmark-item" tabindex="0" role="listitem">
            <div class="bookmark-left">
                <img class="bookmark-favicon" loading="lazy" src="" alt="" width="20" height="20">
            </div>
            <div class="bookmark-center">
                <div class="bookmark-title"></div>
                <div class="bookmark-url"></div>
                <div class="bookmark-meta">
                    <span class="bookmark-domain"></span>
                    <span class="bookmark-folder"></span>
                </div>
            </div>
            <div class="bookmark-right">
                <button class="bookmark-open-btn" title="Open bookmark" aria-label="Open bookmark">↗</button>
            </div>
        </div>
    </template>

    <template id="folderTemplate">
        <div class="folder-node">
            <div class="folder-row">
                <span class="folder-toggle">▶</span>
                <span class="folder-icon">📁</span>
                <span class="folder-name"></span>
                <span class="folder-count"></span>
            </div>
            <div class="folder-children"></div>
        </div>
    </template>

    <template id="duplicateGroupTemplate">
        <div class="duplicate-group">
            <div class="duplicate-header">
                <div class="duplicate-title"></div>
                <div class="duplicate-count"></div>
            </div>
            <div class="duplicate-url"></div>
            <div class="duplicate-items"></div>
        </div>
    </template>

    <template id="domainGroupTemplate">
        <div class="domain-item">
            <div class="domain-item-left">
                <div class="domain-favicon-wrap">
                    <img class="domain-favicon" loading="lazy" src="" alt="" width="18" height="18">
                </div>
                <div class="domain-info">
                    <div class="domain-name"></div>
                    <div class="domain-total"></div>
                </div>
            </div>
            <div class="domain-item-right">View →</div>
        </div>
    </template>

    <script src="storage.js"></script>
    <script src="parser.js"></script>
    <script src="tree.js"></script>
    <script src="app.js"></script>
</body>
</html>
